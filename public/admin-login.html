<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Live Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0e1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: #0f1322;
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        h1 span { color: #2ecc71; }
        .sub { font-size: 12px; color: #7a8aa0; margin-bottom: 32px; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }
        input:focus { border-color: #2ecc71; box-shadow: 0 0 8px rgba(46,204,113,0.2); }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        .error {
            background: rgba(231,76,60,0.1);
            border-left: 3px solid #e74c3c;
            padding: 10px;
            margin-top: 20px;
            font-size: 13px;
            border-radius: 8px;
            color: #e74c3c;
        }
        .info {
            font-size: 12px;
            color: #7a8aa0;
            margin-top: 24px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h1>Tec<span>Live Monitor</span></h1>
    <div class="sub">Área Restrita</div>
    <form action="/admin-login" method="POST">
        <input type="password" name="password" placeholder="Senha de administrador" autofocus required>
        <button type="submit">Entrar</button>
    </form>
    <div id="errorMsg" class="error" style="display: none;">Senha incorreta. Tente novamente.</div>
    <div class="info">Acesso apenas para administradores autorizados.</div>
</div>
<script>
    if (window.location.search.includes('error=1')) {
        document.getElementById('errorMsg').style.display = 'block';
    }
</script>
</body>
</html>

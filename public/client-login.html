<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - YouTube Live Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: #1e293b;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #94a3b8;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4);
        }
        
        .error {
            color: #ef4444;
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
        }
        
        .footer {
            margin-top: 24px;
            text-align: center;
            color: #475569;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>🎥 YouTube Live Monitor</h1>
            <p>Acesse sua conta</p>
        </div>
        
        <input type="email" id="email" placeholder="E-mail" autocomplete="email">
        <input type="password" id="password" placeholder="Senha" autocomplete="current-password" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">Entrar</button>
        
        <div id="error" class="error"></div>
        <div class="footer">Sistema de monitoramento de lives</div>
    </div>
    
    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                document.getElementById('error').innerText = 'Preencha todos os campos';
                return;
            }
            
            try {
                const response = await fetch('/client/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('clientToken', data.token);
                    localStorage.setItem('clientName', data.client.name);
                    window.location.href = '/client-dashboard.html';
                } else {
                    document.getElementById('error').innerText = data.error || 'Erro ao fazer login';
                }
            } catch (error) {
                document.getElementById('error').innerText = 'Erro ao conectar com o servidor';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>YouTube Live Monitor - Cliente</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        
        .logo h1 { font-size: 24px; }
        .logo p { font-size: 12px; color: #94a3b8; }
        
        .logout-btn {
            background: #ef4444;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            color: white;
            font-weight: 600;
        }
        .logout-btn:hover { background: #dc2626; }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #22c55e;
        }
        
        .stat-number { font-size: 48px; font-weight: bold; margin-top: 10px; }
        
        .form-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .form-input {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 14px;
            font-family: monospace;
        }
        
        .form-input:focus { outline: none; border-color: #6366f1; }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(99,102,241,0.4); }
        
        .btn-link {
            background: #22c55e;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            color: white;
            font-weight: 600;
            white-space: nowrap;
        }
        .btn-link:hover { background: #16a34a; transform: translateY(-1px); }
        
        .btn-remove {
            background: #ef4444;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            color: white;
            font-weight: 600;
            width: 100%;
            margin-top: 5px;
        }
        .btn-remove:hover { background: #dc2626; transform: translateY(-1px); }
        
        .live-item {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            transition: all 0.3s;
        }
        .live-item:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        
        .live-thumb {
            width: 160px;
            flex-shrink: 0;
        }
        .live-thumb img {
            width: 100%;
            border-radius: 12px;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        
        .live-info { flex: 1; min-width: 200px; }
        .live-status { color: #22c55e; font-size: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .live-status::before { content: "●"; animation: pulse 1.5s infinite; }
        .live-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .live-url { font-size: 11px; color: #94a3b8; font-family: monospace; word-break: break-all; margin-bottom: 10px; }
        
        .live-link-area { display: flex; flex-direction: column; gap: 8px; min-width: 200px; }
        .live-link-code { background: #020617; padding: 8px 12px; border-radius: 8px; font-family: monospace; font-size: 11px; word-break: break-all; border: 1px solid #334155; }
        
        .loading { display: none; text-align: center; padding: 20px; }
        .loading.show { display: block; }
        .error { color: #ef4444; padding: 10px; display: none; }
        .error.show { display: block; }
        .result-box { display: none; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; margin-top: 20px; }
        .result-box.show { display: block; }
        .link-code { background: #020617; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; word-break: break-all; margin: 15px 0; }
        
        @keyframes pulse { 50% { opacity: 0.4; } }
        
        @media (max-width: 768px) {
            .live-thumb { width: 100%; }
            .live-link-area { width: 100%; }
            .btn-link, .btn-remove { width: 100%; text-align: center; }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🎥 YouTube Live Monitor</h1>
                <p>Gerencie suas lives</p>
            </div>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
        
        <div class="stat-card">
            <h3>📡 Minhas Lives</h3>
            <div class="stat-number" id="totalLives">0</div>
        </div>
        
        <div class="stat-card">
            <h3>➕ Adicionar Nova Live</h3>
            <div class="form-group">
                <input type="text" id="liveUrl" class="form-input" placeholder="https://www.youtube.com/watch?v=...">
                <button class="btn-primary" onclick="addLive()">Adicionar Live</button>
            </div>
            <div class="loading" id="loading">⏳ Processando...</div>
            <div class="error" id="error"></div>
            <div class="result-box" id="resultBox">
                <h4>✅ Live Adicionada!</h4>
                <p>Use o link abaixo no NEOnews:</p>
                <div class="link-code" id="apiLink"></div>
                <button class="btn-link" onclick="copyLink()">📋 Copiar Link</button>
            </div>
        </div>
        
        <div class="stat-card">
            <h3>📺 Minhas Lives</h3>
            <div id="livesList" style="margin-top: 15px;">Nenhuma live cadastrada.</div>
        </div>
    </div>
    
    <script>
        let clientToken = localStorage.getItem('clientToken');
        
        if (!clientToken) {
            window.location.href = '/client-login.html';
        }
        
        function getThumbnailUrl(url) {
            const match = url.match(/(?:youtube\.com\/watch\?v=)([^&]+)/);
            return match ? `https://img.youtube.com/vi/${match[1]}/mqdefault.jpg` : '/images/placeholder.png';
        }
        
        async function apiFetch(url, options = {}) {
            const response = await fetch(url, {
                ...options,
                headers: {
                    ...options.headers,
                    'Authorization': `Bearer ${clientToken}`
                }
            });
            if (response.status === 401) {
                localStorage.removeItem('clientToken');
                window.location.href = '/client-login.html';
                throw new Error('Não autorizado');
            }
            return response;
        }
        
        // 🔥 FUNÇÃO PARA GERAR LINK SEGURO
        async function generateSecureLink(liveId) {
            try {
                const response = await fetch(`/client/generate-link/${liveId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${clientToken}` }
                });
                const data = await response.json();
                return data.secure_link || null;
            } catch (error) {
                console.error('Erro ao gerar link seguro:', error);
                return null;
            }
        }
        
        async function loadLives() {
            try {
                const res = await apiFetch('/client/my-lives');
                const data = await res.json();
                document.getElementById('totalLives').innerText = data.total || 0;
                
                if (data.lives && data.lives.length > 0) {
                    let html = '';
                    for (const live of data.lives) {
                        const thumbnail = getThumbnailUrl(live.youtube_url);
                        const title = live.title || 'Live sem título';
                        
                        // 🔥 GERAR LINK SEGURO VIA API
                        let fullLink = await generateSecureLink(live.id);
                        if (!fullLink) {
                            fullLink = `http://${window.location.hostname}:3002/secure/live/${live.id}.m3u8`;
                        }
                        
                        html += `
                            <div class="live-item">
                                <div class="live-thumb">
                                    <img src="${thumbnail}" alt="Thumbnail" onerror="this.src='/images/placeholder.png'">
                                </div>
                                <div class="live-info">
                                    <div class="live-status">AO VIVO</div>
                                    <div class="live-title">📺 ${escapeHtml(title)}</div>
                                    <div class="live-url">${escapeHtml(live.youtube_url)}</div>
                                </div>
                                <div class="live-link-area">
                                    <div class="live-link-code" id="link-${live.id}">${fullLink.substring(0, 40)}...</div>
                                    <button class="btn-link" onclick="copySpecificLink('${fullLink.replace(/'/g, "\\'")}', 'link-${live.id}')">📋 Copiar Link</button>
                                    <button class="btn-remove" onclick="removeLive(${live.id})">🗑️ Remover</button>
                                </div>
                            </div>
                        `;
                    }
                    document.getElementById('livesList').innerHTML = html;
                } else {
                    document.getElementById('livesList').innerHTML = '<p style="text-align: center; padding: 40px;">📭 Nenhuma live cadastrada. Adicione uma acima.</p>';
                }
            } catch (error) {
                console.error(error);
                document.getElementById('livesList').innerHTML = '<p style="color: #ef4444;">❌ Erro ao carregar lives</p>';
            }
        }
        
        async function addLive() {
            const url = document.getElementById('liveUrl').value.trim();
            if (!url) {
                alert('Digite uma URL do YouTube');
                return;
            }
            
            document.getElementById('loading').classList.add('show');
            document.getElementById('error').classList.remove('show');
            document.getElementById('resultBox').classList.remove('show');
            
            try {
                const res = await apiFetch('/monitor/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                
                if (data.success) {
                    // 🔥 GERAR LINK SEGURO
                    const secureLink = await generateSecureLink(data.live_id);
                    const apiLink = secureLink || `http://${window.location.hostname}:3002/secure/live/${data.live_id}.m3u8`;
                    
                    document.getElementById('apiLink').innerHTML = apiLink;
                    document.getElementById('resultBox').classList.add('show');
                    document.getElementById('liveUrl').value = '';
                    loadLives();
                    setTimeout(() => {
                        document.getElementById('resultBox').classList.remove('show');
                    }, 5000);
                } else {
                    document.getElementById('error').innerHTML = `❌ ${data.error}`;
                    document.getElementById('error').classList.add('show');
                    setTimeout(() => {
                        document.getElementById('error').classList.remove('show');
                    }, 3000);
                }
            } catch (error) {
                document.getElementById('error').innerHTML = '❌ Erro ao conectar com o servidor';
                document.getElementById('error').classList.add('show');
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }
        
        async function removeLive(liveId) {
            if (!confirm('⚠️ Tem certeza que deseja remover esta live?')) return;
            
            try {
                const res = await apiFetch(`/client/lives/${liveId}`, { method: 'DELETE' });
                const data = await res.json();
                
                if (data.success) {
                    alert('✅ Live removida com sucesso!');
                    loadLives();
                } else {
                    alert('❌ Erro: ' + (data.error || 'Tente novamente'));
                }
            } catch (error) {
                console.error('Erro ao remover live:', error);
                alert('❌ Erro ao remover live');
            }
        }
        
        function copyToClipboard(text, elementId) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    showCopyFeedback(elementId);
                }).catch(() => {
                    fallbackCopy(text, elementId);
                });
            } else {
                fallbackCopy(text, elementId);
            }
        }
        
        function fallbackCopy(text, elementId) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.top = '-9999px';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            textarea.setSelectionRange(0, text.length);
            
            try {
                const success = document.execCommand('copy');
                if (success) {
                    showCopyFeedback(elementId);
                } else {
                    alert('❌ Não foi possível copiar. Selecione o texto manualmente.');
                }
            } catch (err) {
                alert('❌ Erro ao copiar. Selecione o texto manualmente.');
            }
            
            document.body.removeChild(textarea);
        }
        
        function showCopyFeedback(elementId) {
            const btn = event?.target || document.activeElement;
            const originalText = btn.innerText;
            btn.innerText = '✅ Copiado!';
            setTimeout(() => {
                btn.innerText = originalText;
            }, 2000);
            
            if (elementId) {
                const linkElement = document.getElementById(elementId);
                if (linkElement) {
                    console.log('Link copiado:', linkElement.innerText);
                }
            }
        }
        
        function copyLink() {
            const linkElement = document.getElementById('apiLink');
            const link = linkElement.innerText;
            
            if (link && link !== 'Adicione uma live para gerar o link') {
                copyToClipboard(link, null);
            } else {
                alert('⚠️ Adicione uma live primeiro.');
            }
        }
        
        function copySpecificLink(link, elementId) {
            copyToClipboard(link, elementId);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function logout() {
            localStorage.removeItem('clientToken');
            window.location.href = '/client-login.html';
        }
        
        loadLives();
        setInterval(loadLives, 15000);
    </script>
</body>
</html>

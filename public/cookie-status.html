<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status do Cookie - NeoNews</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #16213e;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        h1 { color: #e94560; margin-top: 0; }
        .status-card {
            background: #0f3460;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .status-display {
            font-size: 24px;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #0f3460;
        }
        .info-label { font-weight: bold; color: #888; }
        .info-value { font-family: monospace; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
        .warning { color: #ffd43b; }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover { background: #c72a4a; }
        .refresh { background: #0f3460; margin-left: 10px; }
        .refresh:hover { background: #1a4a7a; }
        .cookie-valid { background: #1b5e20; }
        .cookie-invalid { background: #b71c1c; }
        .cookie-unknown { background: #f57c00; }
        .cookie-backup { background: #e65100; }
        .cookie-missing { background: #424242; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍪 Cookie Manager - Status Real</h1>
        
        <div class="status-card">
            <h3>Status do Cookie no YouTube</h3>
            <div id="statusDisplay" class="status-display cookie-unknown">Carregando...</div>
            <div id="failures" class="info-row">
                <span class="info-label">Falhas consecutivas:</span>
                <span id="failuresValue" class="info-value">--</span>
            </div>
            <div id="lastError" class="info-row">
                <span class="info-label">Último erro:</span>
                <span id="lastErrorValue" class="info-value error">--</span>
            </div>
            <div id="lastSuccess" class="info-row">
                <span class="info-label">Última renovação bem-sucedida:</span>
                <span id="lastSuccessValue" class="info-value success">--</span>
            </div>
            <div id="lastCheck" class="info-row">
                <span class="info-label">Última verificação:</span>
                <span id="lastCheckValue" class="info-value">--</span>
            </div>
        </div>
        
        <div class="status-card">
            <h3>Arquivos de Cookie</h3>
            <div id="activeCookie" class="info-row">
                <span class="info-label">Cookie ativo:</span>
                <span id="activeCookieValue" class="info-value">--</span>
            </div>
            <div id="backup" class="info-row">
                <span class="info-label">Backup disponível:</span>
                <span id="backupValue" class="info-value">--</span>
            </div>
        </div>
        
        <div style="text-align: center;">
            <button onclick="fetchStatus()">🔄 Atualizar</button>
            <button onclick="location.href='/admin/cookie'" class="refresh">📤 Upload de Cookie</button>
            <button onclick="location.href='/status.html'" class="refresh">📊 Voltar ao Status</button>
        </div>
    </div>
    
    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/api/cookie/status');
                const data = await response.json();
                
                // Atualizar display do status
                const statusDiv = document.getElementById('statusDisplay');
                statusDiv.innerHTML = data.statusDisplay || 'Status desconhecido';
                statusDiv.className = `status-display cookie-${data.cookieStatus || 'unknown'}`;
                
                // Atualizar informações
                document.getElementById('failuresValue').innerHTML = data.consecutiveFailures || 0;
                document.getElementById('lastErrorValue').innerHTML = data.lastCookieError || 'Nenhum erro';
                document.getElementById('lastSuccessValue').innerHTML = data.lastRenewSuccess ? new Date(data.lastRenewSuccess).toLocaleString() : 'Nunca';
                document.getElementById('lastCheckValue').innerHTML = new Date().toLocaleString();
                document.getElementById('activeCookieValue').innerHTML = data.activeCookie || 'nenhum';
                document.getElementById('backupValue').innerHTML = data.hasBackup ? '✅ Sim' : '❌ Não';
                
                // Destaque para cookie inválido
                if (data.cookieStatus === 'invalid') {
                    document.getElementById('lastErrorValue').style.color = '#ff6b6b';
                } else {
                    document.getElementById('lastErrorValue').style.color = '#888';
                }
            } catch (error) {
                console.error('Erro ao buscar status:', error);
            }
        }
        
        fetchStatus();
        setInterval(fetchStatus, 10000);
    </script>
</body>
</html>
